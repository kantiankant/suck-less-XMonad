# picom.conf — picom-git (yshui)
# Drop in ~/.config/picom/picom.conf
backend = "glx";
vsync = true;
use-damage = true;
fading = false;
shadow = true;
shadow-radius = 14;
shadow-offset-x = -7;
shadow-offset-y = -7;
shadow-opacity = 0.35;
shadow-exclude = [
    "name = 'Notification'",
    "class_g = 'Conky'",
    "class_g ?= 'Notify-osd'",
    "_GTK_FRAME_EXTENTS@:c"
];
corner-radius = 8;
rounded-corners-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'"
];
inactive-opacity = 0.92;
active-opacity = 1.0;
inactive-opacity-override = false;
opacity-rule = [
    "100:class_g = 'firefox'",
    "100:class_g = 'mpv'"
];
animations = ({
    triggers = ["open", "show"];
    offset-x = "(1 - scale-x) / 2 * window-width";
    offset-y = "(1 - scale-y) / 2 * window-height";
    scale-x = {
        curve = "cubic-bezier(0.2, 0.8, 0.2, 1.0)";
        start = 0.9;
        end = 1.0;
        duration = 0.25;
    };
    scale-y = "scale-x";
    opacity = {
        curve = "cubic-bezier(0.2, 0.8, 0.2, 1.0)";
        start = 0;
        end = "window-raw-opacity";
        duration = 0.25;
    };
    shadow-opacity = "opacity";
}, {
    triggers = ["close", "hide"];
    offset-x = "(1 - scale-x) / 2 * window-width";
    offset-y = "(1 - scale-y) / 2 * window-height";
    scale-x = {
        curve = "cubic-bezier(0.2, 0.8, 0.2, 1.0)";
        start = 1.0;
        end = 0.9;
        duration = 0.2;
    };
    scale-y = "scale-x";
    opacity = {
        curve = "cubic-bezier(0.2, 0.8, 0.2, 1.0)";
        start = "window-raw-opacity-before";
        end = 0;
        duration = 0.2;
    };
    shadow-opacity = "opacity";
}, {
    triggers = ["geometry"];
    scale-x = {
        curve = "cubic-bezier(0.2, 0.8, 0.2, 1.0)";
        start = "window-width-before / window-width";
        end = 1.0;
        duration = 0.25;
    };
    scale-y = {
        curve = "cubic-bezier(0.2, 0.8, 0.2, 1.0)";
        start = "window-height-before / window-height";
        end = 1.0;
        duration = 0.25;
    };
    offset-x = {
        curve = "cubic-bezier(0.2, 0.8, 0.2, 1.0)";
        start = "window-x-before - window-x";
        end = 0;
        duration = 0.25;
    };
    offset-y = {
        curve = "cubic-bezier(0.2, 0.8, 0.2, 1.0)";
        start = "window-y-before - window-y";
        end = 0;
        duration = 0.25;
    };
}, {
    triggers = ["workspace-out"];
    offset-x = {
        curve = "cubic-bezier(0.2, 0.8, 0.2, 1.0)";
        start = 0;
        end = "-window-width";
        duration = 0.25;
    };
    opacity = {
        curve = "cubic-bezier(0.2, 0.8, 0.2, 1.0)";
        start = "window-raw-opacity-before";
        end = 0;
        duration = 0.25;
    };
    shadow-opacity = "opacity";
}, {
    triggers = ["workspace-in"];
    offset-x = {
        curve = "cubic-bezier(0.2, 0.8, 0.2, 1.0)";
        start = "window-width";
        end = 0;
        duration = 0.25;
    };
    opacity = {
        curve = "cubic-bezier(0.2, 0.8, 0.2, 1.0)";
        start = 0;
        end = "window-raw-opacity";
        duration = 0.25;
    };
    shadow-opacity = "opacity";
});
blur-method = "dual_kawase";
blur-strength = 15;
blur-background = true;
blur-background-frame = true;
blur-background-fixed = false;
blur-kern = "3x3box";
blur-exclude = [
    "window_type = 'desktop'",
    "class_g = 'slop'",
    "class_g = 'quickshell'"   # bar window — picom ignores the QS mask for blur
];
wintypes:
{
    tooltip = { fade = false; shadow = false; opacity = 0.9; focus = true; };
    dock = { shadow = false; clip-shadow-above = true; blur-background = false; };
    dnd = { shadow = false; };
    popup_menu = { opacity = 0.95; };
    dropdown_menu = { opacity = 0.95; };
};
